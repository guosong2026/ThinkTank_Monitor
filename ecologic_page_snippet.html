<meta name="description" content="What do shaded paths, green roofs and restored waterways have in common? In many cities, they are already part of the urban landscape – yet often remain unnoticed. This guide, published by the German Environment Agency, focuses on these existing measures. It explains how municipalities can use city maps to make nature-based climate adaptation visible, place it in context and communicate it in a transparent and accessible way." />
