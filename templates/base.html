<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThinkTank Monitor - {% block title %}{% endblock %}</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <style>
        body {
            padding-top: 20px;
            background-color: #f8f9fa;
        }
        
        .navbar-brand {
            font-weight: bold;
        }
        
        .card {
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }
        
        .card-header {
            border-radius: 10px 10px 0 0 !important;
            font-weight: bold;
        }
        
        .status-badge {
            font-size: 0.9rem;
            padding: 5px 10px;
        }
        
        .monitor-running {
            background-color: #d4edda;
            color: #155724;
        }
        
        .monitor-stopped {
            background-color: #f8d7da;
            color: #721c24;
        }
        
        .table th {
            background-color: #f1f3f4;
        }
        
        .btn-action {
            min-width: 120px;
        }
        
        footer {
            margin-top: 30px;
            padding: 20px 0;
            border-top: 1px solid #dee2e6;
            text-align: center;
            color: #6c757d;
        }
        
        .loading-spinner {
            display: none;
            color: #0d6efd;
        }
        
        .alert {
            border-radius: 8px;
        }
    </style>
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="container">
        <!-- 导航栏 -->
        <nav class="navbar navbar-expand-lg navbar-light bg-white rounded shadow-sm mb-4">
            <div class="container-fluid">
                <a class="navbar-brand" href="/">
                    <i class="fas fa-search me-2"></i>ThinkTank Monitor
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}" href="/">
                                <i class="fas fa-home me-1"></i>首页
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.endpoint == 'reports_page' %}active{% endif %}" href="/reports">
                                <i class="fas fa-list me-1"></i>报告查看
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.endpoint == 'monitor_runs_page' %}active{% endif %}" href="/monitor_runs">
                                <i class="fas fa-history me-1"></i>监控运行
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.endpoint == 'settings_page' %}active{% endif %}" href="/settings">
                                <i class="fas fa-cog me-1"></i>邮箱设置
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
        
        <!-- 页面内容 -->
        <main>
            {% block content %}{% endblock %}
        </main>
        
        <!-- 页脚 -->
        <footer>
            <div class="row">
                <div class="col-md-12">
                    <p class="mb-0">
                        ThinkTank Monitor v1.0 &copy; 2024 |
                        监控 <span id="website-count">5</span> 个智库网站 |
                        数据库: <span id="db-file">reports.db</span>
                    </p>
                    <p class="text-muted small mt-2">
                        当前时间: <span id="current-time">--:--:--</span> |
                        <span id="last-update">最后更新: --:--:--</span>
                    </p>
                </div>
            </div>
        </footer>
    </div>
    
    <!-- Bootstrap 5 JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- jQuery (用于AJAX) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <!-- 通用JS -->
    <script>
        // 更新当前时间
        function updateCurrentTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('zh-CN');
            $('#current-time').text(timeString);
        }
        
        // 页面加载完成
        $(document).ready(function() {
            // 初始化当前时间
            updateCurrentTime();
            setInterval(updateCurrentTime, 1000);
            
            // 显示加载动画
            $(document).ajaxStart(function() {
                $('.loading-spinner').show();
            });
            
            $(document).ajaxStop(function() {
                $('.loading-spinner').hide();
            });
            
            // 全局错误处理
            $(document).ajaxError(function(event, jqxhr, settings, thrownError) {
                console.error('AJAX请求失败:', settings.url, thrownError);
                alert('请求失败: ' + (jqxhr.responseJSON?.error || thrownError));
            });
        });
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
